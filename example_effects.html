<title>cicdoo — Intro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  #stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  #scanlines { position: fixed; inset: 0; pointer-events: none; z-index: 100; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px); }
  #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 90; }
  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 80; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%); }
  canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  #logo-wrap { position: relative; z-index: 50; opacity: 0; transform: scale(0.1) rotate(-8deg); filter: blur(30px); }
  #logo-wrap img { width: min(640px, 80vw); display: block; }
  #logo-r, #logo-b { position: absolute; inset: 0; pointer-events: none; }
  #logo-r img, #logo-b img { width: min(640px, 80vw); display: block; }
  #logo-r { mix-blend-mode: screen; opacity: 0; }
  #logo-b { mix-blend-mode: screen; opacity: 0; }
  #tagline { position: absolute; bottom: -48px; left: 50%; transform: translateX(-50%) translateY(12px); font-family: Arial, sans-serif; font-size: clamp(9px,1.4vw,16px); letter-spacing: 0.5em; text-transform: uppercase; color: #fff; opacity: 0; white-space: nowrap; }
  .bracket { position: absolute; width: 36px; height: 36px; opacity: 0; z-index: 60; }
  .bracket::before, .bracket::after { content: ''; position: absolute; background: #A31455; }
  .bracket.tl { top: -20px; left: -20px; }
  .bracket.tr { top: -20px; right: -20px; }
  .bracket.bl { bottom: -20px; left: -20px; }
  .bracket.br { bottom: -20px; right: -20px; }
  .bracket.tl::before { top: 0; left: 0; width: 2px; height: 22px; }
  .bracket.tl::after  { top: 0; left: 0; width: 22px; height: 2px; }
  .bracket.tr::before { top: 0; right: 0; width: 2px; height: 22px; }
  .bracket.tr::after  { top: 0; right: 0; width: 22px; height: 2px; }
  .bracket.bl::before { bottom: 0; left: 0; width: 2px; height: 22px; }
  .bracket.bl::after  { bottom: 0; left: 0; width: 22px; height: 2px; }
  .bracket.br::before { bottom: 0; right: 0; width: 2px; height: 22px; }
  .bracket.br::after  { bottom: 0; right: 0; width: 22px; height: 2px; }
  #replay { position: fixed; bottom: 28px; right: 28px; z-index: 200; background: transparent; border: 2px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.5); padding: 8px 20px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; opacity: 0; transition: border-color .2s, color .2s; }
  #replay:hover { border-color: #A31455; color: #fff; }
</style>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const particles = [];
const colors = ['#A31455','#7B8FA8','#ffffff','#ff2266','#4fc3f7'];

function spawnBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 10;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, decay: 0.012+Math.random()*0.025, r: 1.5+Math.random()*4, color: colors[Math.floor(Math.random()*colors.length)] });
  }
}

const rings = [];
function spawnRing(x, y, color) {
  rings.push({ x, y, r: 0, maxR: Math.max(W,H)*0.9, life: 1, color, width: 3+Math.random()*4 });
}

let gridAlpha = 0;
function drawGrid() {
  if (gridAlpha <= 0) return;
  ctx.save();
  ctx.strokeStyle = "rgba(163,20,85," + (gridAlpha*0.18) + ")";
  ctx.lineWidth = 1;
  const gap = 60;
  for (let x = 0; x < W; x += gap) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gap) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

function loop() {
  ctx.clearRect(0,0,W,H);
  drawGrid();
  for (let i = rings.length-1; i >= 0; i--) {
    const rg = rings[i];
    rg.r += (rg.maxR - rg.r) * 0.06;
    rg.life -= 0.018;
    if (rg.life <= 0) { rings.splice(i,1); continue; }
    ctx.save(); ctx.beginPath(); ctx.arc(rg.x,rg.y,rg.r,0,Math.PI*2);
    ctx.strokeStyle = rg.color; ctx.globalAlpha = rg.life*0.7; ctx.lineWidth = rg.width*rg.life; ctx.stroke(); ctx.restore();
  }
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.97; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  requestAnimationFrame(loop);
}
loop();

function flash(duration, alpha) {
  const el = document.getElementById('flash');
  el.style.transition = 'none'; el.style.opacity = alpha;
  setTimeout(() => { el.style.transition = "opacity "+duration+"ms ease-out"; el.style.opacity = 0; }, 20);
}

function shake(el, intensity, duration) {
  const start = performance.now();
  function step(t) {
    const progress = (t-start)/duration;
    if (progress >= 1) { el.style.transform = ''; return; }
    const decay = 1-progress;
    const dx = (Math.random()-0.5)*intensity*decay*2;
    const dy = (Math.random()-0.5)*intensity*decay;
    el.style.transform = "translate("+dx+"px,"+dy+"px)";
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function glitch(times, interval) {
  let count = 0;
  const r = document.getElementById('logo-r');
  const b = document.getElementById('logo-b');
  function tick() {
    if (count++ > times) { r.style.opacity=0; b.style.opacity=0; r.style.transform=''; b.style.transform=''; return; }
    const dx = (Math.random()-0.5)*18; const dy = (Math.random()-0.5)*6;
    r.style.opacity=0.6; b.style.opacity=0.6;
    r.style.filter='hue-rotate(300deg) saturate(4)'; b.style.filter='hue-rotate(200deg) saturate(4)';
    r.style.transform="translate("+dx+"px,"+dy+"px)"; b.style.transform="translate("+(-dx)+"px,"+(-dy)+"px)";
    setTimeout(tick, interval);
  }
  tick();
}

function runIntro() {
  const wrap = document.getElementById('logo-wrap');
  const stage = document.getElementById('stage');
  const tagline = document.getElementById('tagline');
  const brackets = document.querySelectorAll('.bracket');
  const replay = document.getElementById('replay');

  replay.style.opacity = 0;
  wrap.style.transition = 'none'; wrap.style.opacity = 0; wrap.style.transform = 'scale(0.1) rotate(-8deg)'; wrap.style.filter = 'blur(30px)';
  tagline.style.transition = 'none'; tagline.style.opacity = 0; tagline.style.transform = 'translateX(-50%) translateY(12px)';
  brackets.forEach(b => { b.style.transition = 'none'; b.style.opacity = 0; });
  gridAlpha = 0; particles.length = 0; rings.length = 0;

  setTimeout(() => {
    let g = 0; const iv = setInterval(() => { gridAlpha = Math.min(gridAlpha+0.04,1); if(++g>25) clearInterval(iv); }, 30);
    spawnRing(W/2, H/2, '#A31455');
  }, 0);

  setTimeout(() => spawnRing(W/2, H/2, '#7B8FA8'), 300);

  setTimeout(() => {
    flash(80, 0.9); spawnBurst(W/2,H/2,120); shake(stage,18,500); spawnRing(W/2,H/2,'#ffffff');
    wrap.style.transition = 'transform 0.28s cubic-bezier(.05,.9,.3,1.4), opacity 0.15s, filter 0.28s';
    wrap.style.opacity = 1; wrap.style.transform = 'scale(1.18) rotate(0deg)'; wrap.style.filter = 'blur(0px) brightness(2.4)';
  }, 600);

  setTimeout(() => {
    wrap.style.transition = 'transform 0.4s cubic-bezier(.2,.8,.4,1), filter 0.4s';
    wrap.style.transform = 'scale(1) rotate(0deg)'; wrap.style.filter = 'blur(0px) brightness(1)';
  }, 900);

  setTimeout(() => { glitch(8,55); spawnBurst(W/2,H/2,60); flash(60,0.4); }, 1100);

  setTimeout(() => {
    brackets.forEach((b,i) => { b.style.transition = "opacity 0.3s "+(i*0.06)+"s, transform 0.3s "+(i*0.06)+"s"; b.style.opacity = 1; });
  }, 1500);

  setTimeout(() => { glitch(5,45); flash(50,0.25); spawnBurst(W/2,H/2,35); spawnRing(W/2,H/2,'#A31455'); }, 1800);

  setTimeout(() => {
    tagline.style.transition = 'opacity 0.6s, transform 0.6s cubic-bezier(.2,.9,.3,1)';
    tagline.style.opacity = 0.75; tagline.style.transform = 'translateX(-50%) translateY(0px)';
  }, 2200);

  setTimeout(() => { glitch(10,40); flash(40,0.35); spawnBurst(W/2,H/2,50); shake(stage,8,300); }, 2600);

  setTimeout(() => {
    let g=0; const iv = setInterval(() => { gridAlpha = Math.max(gridAlpha-0.04,0); if(++g>25) clearInterval(iv); }, 30);
    wrap.style.transition = 'filter 0.2s'; wrap.style.filter = 'brightness(1.6)';
    setTimeout(() => { wrap.style.transition = 'filter 0.5s'; wrap.style.filter = 'brightness(1)'; }, 200);
  }, 3200);

  setTimeout(() => { replay.style.transition = 'opacity 0.6s'; replay.style.opacity = 1; }, 4000);
}

document.getElementById('replay').addEventListener('click', runIntro);
runIntro();
</script>
