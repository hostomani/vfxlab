<style>
:root {
  --bg:#0a0a0a; --panel:#111113; --border:#1e1e22;
  --accent:#e8ff00; --accent2:#ff2d55;
  --text:#e0e0e0; --muted:#555; --track:#1a1a1e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Mono',monospace;font-size:12px;
  height:100vh;overflow:hidden;
  display:grid;
  grid-template-rows:48px 1fr;
  grid-template-columns:300px 1fr;
}
header{
  grid-column:1/-1;display:flex;align-items:center;
  padding:0 20px;border-bottom:1px solid var(--border);
  gap:20px;background:var(--panel);
}
header h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--accent);}
header .sub{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.hdr-back{
  margin-left:auto;padding:7px 18px;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  transition:all .15s;text-decoration:none;display:flex;align-items:center;
}
.hdr-back:hover{border-color:var(--accent);color:var(--accent);}

.panel-left{
  border-right:1px solid var(--border);background:var(--panel);
  overflow:hidden;display:flex;flex-direction:column;
}
.panel-scroll{flex:1;overflow-y:auto;}
.ad-slot{
  flex-shrink:0;display:flex;justify-content:center;align-items:center;
  border-top:1px solid var(--border);background:var(--panel);
  padding:8px 0;min-height:90px;
}
.panel-section{padding:14px 16px;border-bottom:1px solid var(--border);}
.panel-label{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}

/* Logo drop */
#logo-drop{
  border:2px dashed var(--border);aspect-ratio:1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;cursor:pointer;
  transition:border-color .2s,background .2s;
  text-align:center;padding:20px;position:relative;overflow:hidden;
}
#logo-drop:hover,#logo-drop.drag-over{border-color:var(--accent);background:rgba(232,255,0,0.03);}
#logo-drop .dz-icon{font-size:36px;opacity:0.4;}
#logo-drop .dz-text{color:var(--muted);line-height:1.6;font-size:11px;}
#logo-thumb{position:absolute;inset:0;object-fit:contain;width:100%;height:100%;display:none;background:#000;padding:12px;}
#logo-file{display:none;}

/* Fields */
.field{margin-bottom:10px;}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input[type=text]{
  width:100%;background:var(--track);border:1px solid var(--border);
  color:var(--text);font-family:'DM Mono',monospace;font-size:12px;
  padding:7px 10px;outline:none;transition:border-color .15s;
}
.field input[type=text]:focus{border-color:var(--accent);}
.field input[type=text]::placeholder{color:var(--muted);}

/* Color row */
.color-row{display:flex;align-items:center;gap:10px;}
.color-row label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);flex:1;}
input[type=color]{width:36px;height:26px;padding:1px;background:var(--track);border:1px solid var(--border);cursor:pointer;}
.color-hex{font-size:10px;color:var(--accent);letter-spacing:1px;min-width:56px;}

/* Template grid */
.template-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.tpl-card{
  background:var(--track);border:1px solid var(--border);
  padding:9px 6px;cursor:pointer;transition:all .15s;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tpl-card:hover{border-color:var(--accent);background:rgba(232,255,0,0.04);}
.tpl-card.active{border-color:var(--accent);background:rgba(232,255,0,0.08);}
.tc-icon{font-size:14px;}
.tc-name{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.tpl-card.active .tc-name{color:var(--accent);}

/* Layer list */
.layer-chip{
  display:flex;align-items:center;padding:7px 8px;
  background:var(--track);border:1px solid var(--border);
  margin-bottom:5px;gap:7px;cursor:pointer;transition:border-color .15s;
  user-select:none;
}
.layer-chip:hover{border-color:var(--muted);}
.layer-chip.active{border-color:var(--accent);background:rgba(232,255,0,0.05);}
.layer-chip.dragging{opacity:0.4;border-style:dashed;}
.layer-chip.drag-over-chip{border-color:var(--accent);background:rgba(232,255,0,0.06);}
.chip-drag{color:#333;cursor:grab;font-size:10px;flex-shrink:0;transition:color .15s;}
.layer-chip:hover .chip-drag{color:var(--muted);}
.chip-drag:active{cursor:grabbing;}
.chip-type-icon{font-size:13px;flex-shrink:0;}
.chip-name{flex:1;font-size:10px;letter-spacing:1px;}
.chip-remove{color:var(--muted);cursor:pointer;font-size:13px;flex-shrink:0;transition:color .15s;}
.chip-remove:hover{color:var(--accent2);}
.no-layers{color:var(--muted);font-size:11px;text-align:center;padding:16px 0;}

/* Layer type picker */
.layer-type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:8px;}
.layer-type-card{
  background:var(--bg);border:1px solid var(--border);
  padding:8px 5px;cursor:pointer;transition:all .15s;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.layer-type-card:hover{border-color:var(--accent);background:rgba(232,255,0,0.04);}
.ltc-icon{font-size:13px;}
.ltc-name{font-size:8px;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);}
.layer-type-card:hover .ltc-name{color:var(--accent);}

/* Custom template saves */
.saved-tpl-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.saved-tpl-chip{
  background:var(--track);border:1px solid var(--border);
  padding:3px 8px;font-size:9px;letter-spacing:1px;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.saved-tpl-chip:hover{border-color:var(--accent);color:var(--accent);}
.saved-tpl-del{color:var(--muted);cursor:pointer;font-size:11px;}
.saved-tpl-del:hover{color:var(--accent2);}

/* Params */
.param-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.param-name{font-size:10px;color:var(--muted);min-width:82px;letter-spacing:.5px;}
.param-val{font-size:10px;color:var(--accent);min-width:36px;text-align:right;}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  flex:1;height:2px;background:var(--track);outline:none;border:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;
}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.toggle-label{font-size:10px;color:var(--muted);letter-spacing:.5px;}
.toggle{
  width:34px;height:18px;background:var(--track);
  border:1px solid var(--border);border-radius:9px;
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--accent);border-color:var(--accent);}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:12px;height:12px;border-radius:50%;background:#000;transition:left .2s;
}
.toggle.on::after{left:18px;}
.color-param-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.param-select{
  flex:1;background:var(--track);border:1px solid var(--border);
  color:var(--text);font-family:'DM Mono',monospace;font-size:10px;
  padding:4px 6px;outline:none;cursor:pointer;
}
.param-select:focus{border-color:var(--accent);}
.params-hint{color:var(--muted);font-size:11px;text-align:center;padding:12px 0;}
.param-group-sep{
  font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:var(--border);margin:8px 0 6px;border-top:1px solid var(--border);
  padding-top:6px;
}

/* Buttons */
.btn{
  padding:7px 18px;font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;border:none;transition:all .15s;
}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:var(--accent);color:#000;font-weight:600;}
.btn-primary:hover{background:#fff;}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.btn:disabled:hover{border-color:var(--border);color:var(--muted);}
.btn-xs{padding:3px 8px;font-size:9px;}
.btn-full{width:100%;margin-top:6px;}

/* Center */
.panel-center{
  background:#050505;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#canvas-wrap{
  width:100%;height:calc(100% - 52px);
  display:flex;align-items:center;justify-content:center;
}
#preview{display:block;max-width:100%;max-height:100%;}
.controls-bar{
  position:absolute;bottom:0;left:0;right:0;height:52px;
  background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;
}
.progress-wrap{flex:1;height:3px;background:var(--border);position:relative;border-radius:2px;overflow:hidden;}
#progress-bar{position:absolute;top:0;left:0;height:100%;width:0%;background:var(--accent);}
.time-label{font-size:10px;color:var(--muted);letter-spacing:1px;min-width:50px;}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;z-index:100;
}
.modal{background:var(--panel);border:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:14px;max-width:90vw;max-height:90vh;}
.modal-header{display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.modal-x{color:var(--muted);cursor:pointer;font-size:14px;transition:color .15s;}
.modal-x:hover{color:var(--accent2);}
#record-preview{max-width:min(720px,80vw);max-height:60vh;background:#000;display:block;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--panel);}
::-webkit-scrollbar-thumb{background:var(--border);}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

.param-text{
  width:100%;background:var(--track);border:1px solid var(--border);
  color:var(--text);font-family:'DM Mono',monospace;font-size:11px;
  padding:5px 8px;outline:none;transition:border-color .15s;margin-top:4px;
}
.param-text:focus{border-color:var(--accent);}
.font-row{display:flex;gap:5px;align-items:center;margin-top:4px;}
.font-row select{flex:1;background:var(--track);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 7px;outline:none;cursor:pointer;}
.font-row select:focus{border-color:var(--accent);}
.font-preview{font-size:13px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}

/* ── Timeline ─────────────────────────────────────────────────────────────── */
body.tl-open{grid-template-rows:48px 1fr 190px;}
#timeline-panel{
  grid-column:1/-1;display:none;flex-direction:column;
  background:var(--panel);border-top:2px solid var(--border);
}
body.tl-open #timeline-panel{display:flex;}
#tl-header{
  height:30px;flex-shrink:0;
  display:flex;align-items:center;padding:0 12px;gap:10px;
  border-bottom:1px solid var(--border);
}
#tl-header .tl-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
#tl-time-display{font-size:9px;color:var(--accent);letter-spacing:1px;min-width:32px;}
#tl-scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
.tl-ruler-row,.tl-row{display:flex;align-items:stretch;}
.tl-ruler-row{height:22px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;background:var(--panel);}
.tl-row{height:26px;border-bottom:1px solid rgba(255,255,255,0.03);}
.tl-row:hover{background:rgba(255,255,255,0.02);}
.tl-label{
  width:110px;flex-shrink:0;padding:0 8px;
  font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;border-right:1px solid var(--border);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tl-track{flex:1;position:relative;cursor:crosshair;}
.tl-tick{position:absolute;top:0;bottom:0;border-left:1px solid rgba(255,255,255,0.06);pointer-events:none;}
.tl-tick-label{position:absolute;top:4px;font-size:8px;color:var(--muted);transform:translateX(-50%);pointer-events:none;}
.tl-bar{
  position:absolute;top:3px;bottom:3px;
  background:rgba(232,255,0,0.12);border:1px solid rgba(232,255,0,0.5);
  border-radius:2px;cursor:grab;box-sizing:border-box;min-width:4px;
  transition:background .1s;
}
.tl-bar:hover{background:rgba(232,255,0,0.2);}
.tl-bar.non-timed{
  left:0!important;right:0!important;cursor:default;
  background:rgba(101,117,139,0.1);border-color:rgba(101,117,139,0.35);
}
.tl-handle{
  position:absolute;top:0;bottom:0;width:7px;
  background:rgba(232,255,0,0.8);cursor:ew-resize;
}
.tl-handle.left{left:0;border-radius:2px 0 0 2px;}
.tl-handle.right{right:0;border-radius:0 2px 2px 0;}
#tl-playhead{
  position:absolute;top:0;bottom:0;width:1px;
  background:var(--accent2);pointer-events:none;z-index:5;
  transition:left .05s linear;
}
#tl-playhead::before{
  content:'';position:absolute;top:0;left:-3px;
  border:4px solid transparent;border-top:6px solid var(--accent2);
}
</style>
</head>
<body>

<header>
  <h1>VFXLAB</h1>
  <div class="sub">Intro Generator</div>
  <a href="https://barameg.co" class="hdr-back" target="_blank" rel="noopener">barameg.co ↗</a>
</header>

<aside class="panel-left">
<div class="panel-scroll">
  <!-- Logo -->
  <div class="panel-section">
    <div class="panel-label">Logo / Image</div>
    <div id="logo-drop">
      <img id="logo-thumb" alt="logo">
      <div class="dz-icon">⬡</div>
      <div class="dz-text">Drop logo here<br>or click to upload</div>
    </div>
    <input type="file" id="logo-file" accept="image/*,.svg">
  </div>

  <!-- Text -->
  <div class="panel-section">
    <div class="panel-label">Text</div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="inp-title" placeholder="YOUR STUDIO" value="YOUR STUDIO">
    </div>
    <div class="field">
      <label>Tagline</label>
      <input type="text" id="inp-tagline" placeholder="Est. 2024" value="Est. 2024">
    </div>
  </div>

  <!-- Colors -->
  <div class="panel-section">
    <div class="panel-label">Colors</div>
    <div class="color-row" style="margin-bottom:8px">
      <label>Background</label>
      <input type="color" id="inp-bg" value="#000000">
      <span class="color-hex" id="bg-hex">#000000</span>
    </div>
    <div class="color-row">
      <label>Accent</label>
      <input type="color" id="inp-color" value="#e8ff00">
      <span class="color-hex" id="color-hex">#e8ff00</span>
    </div>
  </div>

  <!-- Template -->
  <div class="panel-section">
    <div class="panel-label">Template</div>
    <div class="template-grid" id="template-grid"></div>
  </div>

  <!-- Layers (custom only) -->
  <div class="panel-section" id="layers-section" style="display:none">
    <div class="panel-label">
      <span>Layers</span>
      <div style="display:flex;gap:4px">
        <button class="btn btn-ghost btn-xs" id="btn-save-custom">+ Save</button>
        <button class="btn btn-ghost btn-xs" id="btn-export-layers">↑ Export</button>
        <button class="btn btn-ghost btn-xs" id="btn-import-layers">↓ Import</button>
        <input type="file" id="import-layers-file" accept=".json" style="display:none">
      </div>
    </div>
    <div id="saved-tpl-list" class="saved-tpl-list"></div>
    <div id="layer-list"></div>
    <button class="btn btn-ghost btn-full" id="btn-toggle-picker">+ Add Layer</button>
    <div id="layer-picker" style="display:none">
      <div class="layer-type-grid" id="layer-type-grid"></div>
    </div>
  </div>

  <!-- Params (template params or selected layer params) -->
  <div class="panel-section" id="params-section">
    <div class="panel-label" id="params-label">Parameters</div>
    <div id="params-body"></div>
  </div>

  <!-- Timing -->
  <div class="panel-section">
    <div class="panel-label">Timing</div>
    <div class="param-row">
      <span class="param-name">Duration</span>
      <input type="range" id="sl-duration" min="2" max="10" step="0.5" value="4">
      <span class="param-val" id="val-duration">4s</span>
    </div>
    <div class="param-row">
      <span class="param-name">FPS</span>
      <input type="range" id="sl-fps" min="24" max="60" step="6" value="30">
      <span class="param-val" id="val-fps">30</span>
    </div>
  </div>
</div><!-- /.panel-scroll -->

<!-- SIDEBAR AD — create a Display ad unit in AdSense → Ads → By ad unit,
     paste the data-ad-slot value below (replace 0000000000) -->
<div class="ad-slot">
  <ins class="adsbygoogle"
       style="display:inline-block;width:300px;height:250px"
       data-ad-client="ca-pub-3376762627230111"
       data-ad-slot="6144598603"></ins>
  <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>
</aside>

<main class="panel-center">
  <div id="canvas-wrap">
    <canvas id="preview" width="1280" height="720"></canvas>
  </div>
  <div class="controls-bar">
    <button class="btn btn-ghost" id="btn-play">▶ Play</button>
    <button class="btn btn-ghost" id="btn-pause" disabled>⏸ Pause</button>
    <button class="btn btn-ghost" id="btn-stop" disabled>⏹ Stop</button>
    <div class="progress-wrap"><div id="progress-bar"></div></div>
    <span class="time-label" id="time-label">0.0s</span>
    <button class="btn btn-ghost" id="btn-record">⏺ Record</button>
    <button class="btn btn-ghost" id="btn-timeline" title="Toggle Timeline Editor" style="margin-left:8px">⏱ Timeline</button>
  </div>
</main>

<div id="timeline-panel">
  <div id="tl-header">
    <span class="tl-title">Timeline</span>
    <span id="tl-time-display">0.0s</span>
    <div style="flex:1"></div>
    <button class="btn btn-ghost btn-xs" id="tl-close">✕ Close</button>
  </div>
  <div id="tl-scroll">
    <div class="tl-ruler-row">
      <div class="tl-label"></div>
      <div class="tl-track" id="tl-ruler"></div>
    </div>
    <div id="tl-tracks"></div>
    <div id="tl-playhead" style="left:110px"></div>
  </div>
</div>

<div id="record-modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Preview Recording</span>
      <span id="modal-close" class="modal-x">✕</span>
    </div>
    <video id="record-preview" controls loop autoplay muted></video>
    <!-- MODAL AD — create a second Display ad unit in AdSense,
         paste the data-ad-slot value below (replace 1111111111) -->
    <div class="ad-slot" style="border-top:none;border-bottom:1px solid var(--border);">
      <ins class="adsbygoogle"
           style="display:inline-block;width:300px;height:250px"
           data-ad-client="ca-pub-3376762627230111"
           data-ad-slot="7655827106"></ins>
      <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-discard">Discard</button>
      <button class="btn btn-primary" id="modal-download">Download WebM</button>
    </div>
  </div>
</div>

<script>
// ─── Canvas ───────────────────────────────────────────────────────────────────
const W = 1280, H = 720;
const canvas = document.getElementById('preview');

// ─── Math ─────────────────────────────────────────────────────────────────────
const clamp       = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const lerp        = (a,b,t)   => a + (b-a)*t;
const easeOut3    = t => 1 - Math.pow(1-t, 3);
const easeOut5    = t => 1 - Math.pow(1-t, 5);
const easeOutBack = t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };
function hex2rgb(h){ return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}; }

// ─── Font system ──────────────────────────────────────────────────────────────
const BUILTIN_FONTS=[
  'Bebas Neue','DM Mono','Oswald','Anton','Orbitron','Rajdhani',
  'Exo 2','Russo One','Space Grotesk','Barlow Condensed','Share Tech Mono','Michroma',
];
const loadedFonts=new Set(['Bebas Neue','DM Mono']);
let customFonts=[]; // {name}

function getAllFonts(){return [...BUILTIN_FONTS,...customFonts.map(f=>f.name)];}

async function ensureFont(name){
  if(!name||loadedFonts.has(name))return;
  if(customFonts.find(f=>f.name===name)){loadedFonts.add(name);return;}
  loadedFonts.add(name);
  const slug=name.replace(/\s+/g,'+');
  const link=document.createElement('link');
  link.rel='stylesheet';
  link.href=`https://fonts.googleapis.com/css2?family=${slug}:wght@400;700&display=swap`;
  document.head.appendChild(link);
  try{await document.fonts.load(`700 16px '${name}'`);}catch(e){}
}

async function loadCustomFont(file){
  const name=file.name.replace(/\.[^.]+$/,'');
  const buf=await file.arrayBuffer();
  const ff=new FontFace(name,buf);
  await ff.load();
  document.fonts.add(ff);
  customFonts.push({name});
  loadedFonts.add(name);
  return name;
}

// ─── Logo aspect-ratio helper ─────────────────────────────────────────────────
// Returns {w,h} that fit `maxSize` while preserving the logo's aspect ratio.
function logoFit(maxSize){
  if(!logoImg)return{w:maxSize,h:maxSize};
  const nw=logoImg.naturalWidth||512, nh=logoImg.naturalHeight||512;
  const ar=nw/nh;
  return ar>=1?{w:maxSize,h:maxSize/ar}:{w:maxSize*ar,h:maxSize};
}

// ─── Logo channel extraction ──────────────────────────────────────────────────
function buildLogoChannels(){
  if(!logoImg){logoChR=logoChB=null;return;}
  const tmp=document.createElement('canvas');
  const nw=logoImg.naturalWidth||512, nh=logoImg.naturalHeight||512;
  tmp.width=nw;tmp.height=nh;
  tmp.getContext('2d').drawImage(logoImg,0,0,nw,nh);
  const {data}=tmp.getContext('2d').getImageData(0,0,tmp.width,tmp.height);
  logoChR=document.createElement('canvas');logoChR.width=tmp.width;logoChR.height=tmp.height;
  logoChB=document.createElement('canvas');logoChB.width=tmp.width;logoChB.height=tmp.height;
  const rCtx=logoChR.getContext('2d'),rId=rCtx.createImageData(tmp.width,tmp.height);
  const bCtx=logoChB.getContext('2d'),bId=bCtx.createImageData(tmp.width,tmp.height);
  for(let i=0;i<data.length;i+=4){
    const a=data[i+3];
    rId.data[i]=data[i];rId.data[i+3]=a;
    bId.data[i+2]=data[i+2];bId.data[i+3]=a;
  }
  rCtx.putImageData(rId,0,0);bCtx.putImageData(bId,0,0);
}

// ─── Drawing primitives ───────────────────────────────────────────────────────
// Pre-generated grain pool — avoids recreating ImageData every frame.
// Each frame is a full-opacity B&W noise canvas; alpha is applied via globalAlpha on drawImage.
const GRAIN_POOL_SIZE = 10;
let grainPool = null, grainIdx = 0;
function ensureGrain(){
  if(grainPool)return;
  grainPool=Array.from({length:GRAIN_POOL_SIZE},()=>{
    const c=document.createElement('canvas');c.width=W;c.height=H;
    const gctx=c.getContext('2d');
    const id=gctx.createImageData(W,H);
    for(let i=0;i<id.data.length;i+=4){const v=(Math.random()*255)|0;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=255;}
    gctx.putImageData(id,0,0);return c;
  });
}
function drawGrain(alpha){
  if(alpha<=0)return;
  ensureGrain();
  ctx.save();ctx.globalAlpha=alpha;
  ctx.drawImage(grainPool[grainIdx++%GRAIN_POOL_SIZE],0,0);
  ctx.restore();
}
function drawScanlines(alpha){
  if(alpha<=0)return;
  ctx.save();ctx.globalAlpha=alpha;
  for(let y=0;y<H;y+=3){ctx.fillStyle='#000';ctx.fillRect(0,y,W,1);}
  ctx.restore();
}
function drawVignette(strength){
  if(strength<=0)return;
  const g=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${strength})`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function drawLogoNormal(x,y,w,h,alpha){
  if(!logoImg)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.drawImage(logoImg,x-w/2,y-h/2,w,h);ctx.restore();
}
function drawLogoChromatic(x,y,w,h,alpha,shift){
  if(!logoImg)return;
  ctx.save();ctx.globalCompositeOperation='screen';
  if(logoChR){ctx.globalAlpha=alpha;ctx.drawImage(logoChR,x-w/2-shift,y-h/2,w,h);}
  if(logoChB){ctx.globalAlpha=alpha;ctx.drawImage(logoChB,x-w/2+shift,y-h/2,w,h);}
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=alpha*0.85;
  ctx.drawImage(logoImg,x-w/2,y-h/2,w,h);ctx.restore();
}
function drawLogoGlitch(x,y,w,h,alpha,intensity){
  if(!logoImg)return;
  const slices=6,sliceH=h/slices;
  ctx.save();ctx.globalAlpha=alpha;
  for(let i=0;i<slices;i++){
    const ox=(Math.random()-0.5)*intensity;
    const sy=i*(logoImg.naturalHeight/slices),sh=logoImg.naturalHeight/slices;
    ctx.drawImage(logoImg,0,sy,logoImg.naturalWidth,sh,x-w/2+ox,y-h/2+i*sliceH,w,sliceH);
  }
  ctx.restore();
}
function drawTitle(text,x,y,size,color,alpha,spacing){
  if(!text)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.font=`${size}px 'Bebas Neue',sans-serif`;
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
  if(spacing){
    const letters=text.split('');
    const totalW=ctx.measureText(text).width+(letters.length-1)*spacing;
    let cx=x-totalW/2;
    for(const ch of letters){const cw=ctx.measureText(ch).width;ctx.fillText(ch,cx+cw/2,y);cx+=cw+spacing;}
  } else {ctx.fillText(text,x,y);}
  ctx.restore();
}
function drawTagline(text,x,y,size,color,alpha){
  if(!text)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.font=`300 ${size}px 'DM Mono',monospace`;
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x,y);ctx.restore();
}
function drawBrackets(cx,cy,bw,bh,alpha,color,arm){
  arm=arm||36;const x=cx-bw/2,y=cy-bh/2;
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();
  ctx.moveTo(x,y+arm);ctx.lineTo(x,y);ctx.lineTo(x+arm,y);
  ctx.moveTo(x+bw-arm,y);ctx.lineTo(x+bw,y);ctx.lineTo(x+bw,y+arm);
  ctx.moveTo(x,y+bh-arm);ctx.lineTo(x,y+bh);ctx.lineTo(x+arm,y+bh);
  ctx.moveTo(x+bw-arm,y+bh);ctx.lineTo(x+bw,y+bh);ctx.lineTo(x+bw,y+bh-arm);
  ctx.stroke();ctx.restore();
}
function drawPerspGrid(alpha,color,horizon,vanishX,rows,cols){
  if(alpha<=0)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=0.8;ctx.beginPath();
  for(let i=0;i<=cols;i++){const bx=W/cols*i;ctx.moveTo(vanishX,horizon);ctx.lineTo(bx,H);}
  for(let r=0;r<=rows;r++){const t=r/rows,y=lerp(horizon,H,t);ctx.moveTo(lerp(vanishX,0,t),y);ctx.lineTo(lerp(vanishX,W,t),y);}
  ctx.stroke();ctx.restore();
}
function drawHexCell(x,y,r){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}
  ctx.closePath();
}
function drawHexGrid(alpha,size,color){
  if(alpha<=0)return;
  const rH=size*Math.sqrt(3);
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=0.5;ctx.beginPath();
  for(let row=-1;row*rH<H+rH;row++)for(let col=-1;col*size*1.5<W+size;col++)drawHexCell(col*size*1.5,row*rH+(col%2?rH/2:0),size);
  ctx.stroke();ctx.restore();
}

// ─── Particles ────────────────────────────────────────────────────────────────
let particles=[];
function spawnParticles(x,y,count,color,speed,r){
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,spd=(0.5+Math.random())*speed;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-speed*0.5,life:1,decay:0.015+Math.random()*0.025,r:(0.5+Math.random())*r,color});}
}
function tickParticles(){
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.decay;}
  particles=particles.filter(p=>p.life>0);
}
function drawParticles(){
  for(const p of particles){ctx.save();ctx.globalAlpha=p.life*0.8;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
}

// ─── Rings ────────────────────────────────────────────────────────────────────
let rings=[];
function spawnRing(x,y,color,maxR,width){rings.push({x,y,r:0,maxR:maxR||200,life:1,color,width:width||1.5});}
function tickRings(){for(const r of rings){r.r+=(r.maxR-r.r)*0.06;r.life-=0.025;}rings=rings.filter(r=>r.life>0);}
function drawRings(){
  for(const r of rings){ctx.save();ctx.globalAlpha=r.life*0.7;ctx.strokeStyle=r.color;ctx.lineWidth=r.width;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();ctx.restore();}
}

// ─── Rain ─────────────────────────────────────────────────────────────────────
let rainDrops=[];
function initRain(count){
  rainDrops=Array.from({length:count},()=>({x:Math.random()*W,y:Math.random()*H,len:12+Math.random()*30,speed:8+Math.random()*10,alpha:0.1+Math.random()*0.25}));
}
function tickRain(){
  for(const d of rainDrops){d.x+=d.speed*0.25;d.y+=d.speed;if(d.y>H){d.y=-d.len;d.x=Math.random()*W;}}
}
function drawRain(alpha,color){
  if(alpha<=0)return;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=0.5;
  for(const d of rainDrops){ctx.globalAlpha=d.alpha*alpha;ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-d.speed*0.25,d.y-d.len);ctx.stroke();}
  ctx.restore();
}

// ─── Data streams ─────────────────────────────────────────────────────────────
let dataStreams=[];
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&';
function initDataStreams(count){
  dataStreams=Array.from({length:count},()=>{const len=5+Math.floor(Math.random()*15);
    return{x:Math.random()*W,y:Math.random()*H-H,speed:1+Math.random()*3,length:len,alpha:0.3+Math.random()*0.5,
      chars:Array.from({length:len},()=>CHARS[Math.floor(Math.random()*CHARS.length)])};});
}
function tickDataStreams(){
  for(const s of dataStreams){s.y+=s.speed;if(s.y>H+s.length*16){s.y=-s.length*16;s.x=Math.random()*W;}
    if(Math.random()<0.08)s.chars[Math.floor(Math.random()*s.chars.length)]=CHARS[Math.floor(Math.random()*CHARS.length)];}
}
function drawDataStreams(alpha,color){
  if(alpha<=0)return;
  ctx.save();ctx.font='12px DM Mono,monospace';ctx.textAlign='center';
  for(const s of dataStreams)for(let i=0;i<s.chars.length;i++){
    ctx.globalAlpha=s.alpha*alpha*(1-i/s.chars.length);ctx.fillStyle=i===0?'#fff':color;ctx.fillText(s.chars[i],s.x,s.y-i*16);}
  ctx.restore();
}

// ─── Events ───────────────────────────────────────────────────────────────────
let events=[];
function scheduleEvent(ms,fn){events.push({ms,fn,fired:false});}
function fireEvents(elapsed){for(const ev of events)if(!ev.fired&&elapsed>=ev.ms){ev.fn();ev.fired=true;}}

// ─── Fade-out helper ──────────────────────────────────────────────────────────
function applyFadeOut(alpha,elapsed,D){
  const fo=D-600;
  if(elapsed>fo)return alpha*(1-clamp((elapsed-fo)/600,0,1));
  return alpha;
}

// Build a layer instance from a def type
function createLayer(type){
  const def=LAYER_DEFS.find(d=>d.type===type);
  if(!def)return null;
  const params=def.params.map(p=>({...p}));
  if(def.timed){
    params.unshift(
      {key:'anim_in',   label:'Fade In (ms)',  type:'range', min:0,max:2000,value:500,step:50,unit:'ms'},
      {key:'anim_out',  label:'Fade Out (ms)', type:'range', min:0,max:2000,value:400,step:50,unit:'ms'},
      {key:'trigger_at',label:'Trigger (0→1)', type:'range', min:0,max:1,value:0,step:0.01,unit:''},
      {key:'exit_at',   label:'Exit (0→1)',    type:'range', min:0,max:1,value:1,step:0.01,unit:''},
      {key:'reverse',   label:'Reverse',       type:'toggle',value:false},
    );
  }
  return {type,params,_fired:false};
}

// Get alpha for a timed layer (respects trigger_at, anim_in, exit_at)
function layerAlpha(layer,elapsed,D){
  const def=LAYER_DEFS.find(d=>d.type===layer.type);
  if(!def.timed)return 1;
  const p=key=>layer.params.find(pp=>pp.key===key)?.value;
  const trigger=(p('trigger_at')??0)*D;
  const animIn=p('anim_in')??500;
  const animOut=p('anim_out')??400;
  const exitAtVal=p('exit_at'); const exitAt=(exitAtVal!=null?exitAtVal:1)*D;
  if(elapsed<trigger||elapsed>=exitAt)return 0;
  const fadeIn=animIn>0?easeOut3(clamp((elapsed-trigger)/animIn,0,1)):1;
  const fadeOut=animOut>0?clamp((exitAt-elapsed)/animOut,0,1):1;
  return Math.min(fadeIn,fadeOut);
}

// Normalized animation progress for a timed layer (0→1, flipped when reverse=true)
function layerProg(layer,elapsed,D){
  const p=key=>layer.params.find(pp=>pp.key===key)?.value;
  const trigger=(p('trigger_at')??0)*D;
  const animIn=p('anim_in')??500;
  const raw=clamp((elapsed-trigger)/Math.max(animIn,1),0,1);
  return p('reverse')?1-raw:raw;
}

// Render a single layer
function renderLayer(layer,elapsed,D){
  const p=key=>layer.params.find(pp=>pp.key===key)?.value;
  const def=LAYER_DEFS.find(d=>d.type===layer.type);
  // Timed layers handle fade-out via exit_at in layerAlpha; non-timed use global applyFadeOut
  const alpha=def?.timed?layerAlpha(layer,elapsed,D):applyFadeOut(layerAlpha(layer,elapsed,D),elapsed,D);

  switch(layer.type){

    case 'bg_solid':
      ctx.fillStyle=p('color');ctx.fillRect(0,0,W,H);break;

    case 'bg_gradient':{
      const g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,p('top'));g.addColorStop(p('mid_pos'),p('mid'));g.addColorStop(1,p('bottom'));
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);break;}

    case 'logo':{
      if(!logoImg)break;
      const lw=p('width'),lh=p('height'),yo=p('y_off'),style=p('style')||0;
      const progress=layerProg(layer,elapsed,D);
      if(style===2){
        const gi=p('glitch_int')*(1-progress);
        if(progress<1)drawLogoGlitch(W/2,H/2+yo,lw,lh,alpha,gi);
        else drawLogoChromatic(W/2,H/2+yo,lw,lh,alpha,0);
      } else if(style===1){
        const ca=clamp(1-progress,0,1)*p('ca');
        drawLogoChromatic(W/2,H/2+yo,lw,lh,alpha,ca);
      } else {
        drawLogoNormal(W/2,H/2+yo,lw,lh,alpha);
      }
      break;}

    case 'title_text':{
      const anim=p('anim')||0,ty=H/2+p('y_off');
      if(anim===2){
        const wipe=layerProg(layer,elapsed,D);
        ctx.save();ctx.beginPath();ctx.rect(0,0,W*wipe,H);ctx.clip();
        drawTitle(title(),W/2,ty,p('size'),p('color'),alpha,p('spacing'));
        ctx.restore();
      } else if(anim===1){
        const slide=easeOut5(layerProg(layer,elapsed,D));
        drawTitle(title(),W/2,lerp(ty+30,ty,slide),p('size'),p('color'),alpha,p('spacing'));
      } else {
        drawTitle(title(),W/2,ty,p('size'),p('color'),alpha,p('spacing'));
      }
      if(p('glow')&&alpha>0){
        ctx.save();ctx.globalAlpha=alpha*0.6;ctx.shadowColor=p('color');ctx.shadowBlur=20;
        ctx.font=`${p('size')}px 'Bebas Neue',sans-serif`;ctx.fillStyle=p('color');
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(title(),W/2,H/2+p('y_off'));ctx.restore();
      }
      break;}

    case 'tagline_text':
      drawTagline(tagline(),W/2,H/2+p('y_off'),p('size'),p('color'),alpha);break;

    case 'divider':{
      const lw=W*p('width')/100*alpha;
      ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=p('color');ctx.lineWidth=p('thick');
      ctx.beginPath();ctx.moveTo(W/2-lw/2,H/2+p('y_off'));ctx.lineTo(W/2+lw/2,H/2+p('y_off'));ctx.stroke();ctx.restore();break;}

    case 'brackets':{
      const expand=p('expand');
      if(expand){
        const bp=layerProg(layer,elapsed,D);
        const bw=lerp(40,p('width'),easeOutBack(bp));
        drawBrackets(W/2,H/2+p('y_off'),bw,p('height'),alpha,p('color'),p('arm'));
      } else {
        drawBrackets(W/2,H/2+p('y_off'),p('width'),p('height'),alpha,p('color'),p('arm'));
      }
      break;}

    case 'vignette':
      drawVignette(p('strength')/100*0.9);break;

    case 'scanlines':
      drawScanlines(p('alpha')/100*0.15);break;

    case 'grain':
      drawGrain(p('alpha')/100*0.06);break;

    case 'letterbox':{
      const h=H*p('height')/100;
      const lp=easeOut5(layerProg(layer,elapsed,D));
      ctx.fillStyle='#000';
      ctx.fillRect(0,0,W,h*lp);ctx.fillRect(0,H-h*lp,W,h*lp);break;}

    case 'hex_grid':
      drawHexGrid(alpha*p('alpha')/100*0.4,p('size'),p('color'));break;

    case 'persp_grid':
      drawPerspGrid(alpha*p('alpha')/100*0.6,p('color'),H*p('horizon')/100,W/2,p('rows'),p('cols'));break;

    case 'retro_sun':{
      const sy=H*p('y_pos')/100,sr=p('size');
      const col=hex2rgb(p('color'));
      const sp=easeOut5(layerProg(layer,elapsed,D));
      const cr=sr*sp;
      const sg=ctx.createRadialGradient(W/2,sy,0,W/2,sy,cr);
      sg.addColorStop(0,`rgba(${col.r},${col.g},${col.b},0.9)`);
      sg.addColorStop(0.4,`rgba(${col.r},${Math.min(col.g,80)},0,0.7)`);
      sg.addColorStop(1,'rgba(80,0,60,0)');
      ctx.save();ctx.globalAlpha=alpha;
      ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W/2,sy,cr*1.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=p('color');ctx.beginPath();ctx.arc(W/2,sy,cr,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      for(let i=0;i<7;i++)ctx.fillRect(W/2-cr,sy-cr*0.6+i*(cr*1.2/7),cr*2,cr*0.07);
      ctx.restore();break;}

    case 'data_streams':
      tickDataStreams();
      drawDataStreams(alpha*p('alpha')/100,p('color'));break;

    case 'rain':
      tickRain();
      drawRain(alpha*p('alpha')/100,p('color'));break;

    case 'rings':{
      if(!layer._fired){
        const trigger=(p('trigger_at')??0)*D;
        if(elapsed>=trigger){
          layer._fired=true;
          for(let i=0;i<p('count');i++)spawnRing(W/2,H/2,p('color'),p('max_r'),p('width'));
        }
      }
      tickRings();drawRings();break;}

    case 'particles':{
      if(!layer._fired){
        const trigger=(p('trigger_at')??0)*D;
        if(elapsed>=trigger){
          layer._fired=true;
          spawnParticles(W/2,H/2,p('count'),p('color'),p('speed'),p('size'));
        }
      }
      tickParticles();drawParticles();break;}

    case 'flash':{
      const trigger=(p('trigger_at')??0)*D;
      const hold=p('hold');
      if(elapsed>=trigger&&elapsed<trigger+hold){
        const fp=clamp((elapsed-trigger)/hold,0,1);
        ctx.fillStyle=p('color');ctx.globalAlpha=1-fp;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
      }
      break;}

    case 'neon_glow':{
      const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*0.6);
      const col=hex2rgb(p('color'));
      const a=p('alpha')/100*0.3;
      g.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${a})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);break;}

    // ── Cinematic ──────────────────────────────────────────────────────────
    case 'light_leak':{
      if(alpha<=0)break;
      const corner=p('corner')||0;
      const sz=p('size')/100*Math.max(W,H)*1.2;
      const ox=corner===0||corner===2?0:W;
      const oy=corner===0||corner===1?0:H;
      const col=hex2rgb(p('color')),a=alpha*p('alpha')/100;
      const g=ctx.createRadialGradient(ox,oy,0,ox,oy,sz);
      g.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${a})`);
      g.addColorStop(0.5,`rgba(${col.r},${col.g},${col.b},${a*0.3})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);break;}

    case 'bokeh':{
      if(alpha<=0)break;
      if(!layer._state){
        layer._state=Array.from({length:Math.round(p('count'))},()=>({
          x:Math.random()*W,y:Math.random()*H,
          r:10+Math.random()*p('size'),
          vx:(Math.random()-0.5)*p('speed'),vy:(Math.random()-0.5)*p('speed'),
          phase:Math.random()*Math.PI*2,
        }));
      }
      const col=hex2rgb(p('color'));
      ctx.save();
      for(const b of layer._state){
        b.x+=b.vx;b.y+=b.vy;
        if(b.x<-b.r)b.x=W+b.r;if(b.x>W+b.r)b.x=-b.r;
        if(b.y<-b.r)b.y=H+b.r;if(b.y>H+b.r)b.y=-b.r;
        b.phase+=0.01;
        const pulse=0.7+0.3*Math.sin(b.phase);
        const a=alpha*(p('alpha')/100)*pulse*0.6;
        const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
        g.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${a})`);
        g.addColorStop(0.5,`rgba(${col.r},${col.g},${col.b},${a*0.3})`);
        g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();break;}

    case 'corner_marks':{
      if(alpha<=0)break;
      const arm=p('arm'),m=p('margin'),a=alpha*p('alpha')/100;
      const col=p('color');
      ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();
      // TL
      ctx.moveTo(m+arm,m);ctx.lineTo(m,m);ctx.lineTo(m,m+arm);
      // TR
      ctx.moveTo(W-m-arm,m);ctx.lineTo(W-m,m);ctx.lineTo(W-m,m+arm);
      // BL
      ctx.moveTo(m,H-m-arm);ctx.lineTo(m,H-m);ctx.lineTo(m+arm,H-m);
      // BR
      ctx.moveTo(W-m-arm,H-m);ctx.lineTo(W-m,H-m);ctx.lineTo(W-m,H-m-arm);
      ctx.stroke();ctx.restore();break;}

    // ── Glitch / Tech ──────────────────────────────────────────────────────
    case 'glitch_bars':{
      if(alpha<=0)break;
      const spd=p('speed'),intens=p('intensity')/100,cnt=Math.round(p('count'));
      if(!layer._state)layer._state={t:0,bars:[]};
      layer._state.t+=spd/60;
      if(Math.floor(layer._state.t)>Math.floor(layer._state.t-spd/60)||layer._state.bars.length===0){
        const col=hex2rgb(p('color'));
        layer._state.bars=Array.from({length:cnt},()=>({
          y:Math.random()*H, h:1+Math.random()*18,
          ox:(Math.random()-0.5)*W*intens*0.4,
          r:col.r,g:col.g,b:col.b,
          a:0.15+Math.random()*0.5,
          rgb:Math.random()<0.3,
        }));
      }
      ctx.save();
      for(const bar of layer._state.bars){
        ctx.globalAlpha=alpha*bar.a;
        if(bar.rgb){
          ctx.fillStyle=`rgba(255,0,0,0.5)`;ctx.fillRect(bar.ox-2,bar.y,W,bar.h);
          ctx.fillStyle=`rgba(0,255,255,0.5)`;ctx.fillRect(bar.ox+2,bar.y,W,bar.h);
        }
        ctx.fillStyle=`rgba(${bar.r},${bar.g},${bar.b},1)`;
        ctx.fillRect(bar.ox,bar.y,W,bar.h);
      }
      ctx.restore();break;}

    case 'radar':{
      if(alpha<=0)break;
      if(!layer._state)layer._state={angle:0,dots:[],pingTimer:0};
      const s=layer._state,sz=p('size'),spd2=p('speed'),col2=p('color'),cy=H/2+p('y_off');
      const col=hex2rgb(col2);
      s.angle=(s.angle+spd2*Math.PI*2/60)%(Math.PI*2);
      // Spawn ping dots periodically
      s.pingTimer++;
      const dotCount=Math.round(p('dots'));
      if(s.pingTimer>Math.round(60/Math.max(spd2,0.1)/Math.max(dotCount,1))&&dotCount>0){
        s.pingTimer=0;
        s.dots.push({r:Math.random()*sz*0.85,a:s.angle+(Math.random()-0.5)*0.3,life:1});
      }
      s.dots=s.dots.filter(d=>d.life>0);
      s.dots.forEach(d=>{d.life-=0.015;});
      ctx.save();ctx.globalAlpha=alpha;
      // Outer circle
      ctx.strokeStyle=col2;ctx.lineWidth=1;ctx.globalAlpha=alpha*0.4;
      ctx.beginPath();ctx.arc(W/2,cy,sz,0,Math.PI*2);ctx.stroke();
      // Inner rings
      [0.33,0.66].forEach(f=>{ctx.beginPath();ctx.arc(W/2,cy,sz*f,0,Math.PI*2);ctx.stroke();});
      // Cross hairs
      ctx.beginPath();ctx.moveTo(W/2-sz,cy);ctx.lineTo(W/2+sz,cy);ctx.moveTo(W/2,cy-sz);ctx.lineTo(W/2,cy+sz);ctx.stroke();
      // Sweep
      const sweep=ctx.createConicalGradient?.(W/2,cy,s.angle)??null;
      if(sweep){
        sweep.addColorStop(0,`rgba(${col.r},${col.g},${col.b},0.5)`);
        sweep.addColorStop(0.15,'transparent');
        ctx.globalAlpha=alpha;ctx.fillStyle=sweep;ctx.beginPath();ctx.arc(W/2,cy,sz,0,Math.PI*2);ctx.fill();
      } else {
        // Fallback: arc wedge
        ctx.globalAlpha=alpha*0.4;ctx.fillStyle=`rgba(${col.r},${col.g},${col.b},0.3)`;
        ctx.beginPath();ctx.moveTo(W/2,cy);ctx.arc(W/2,cy,sz,s.angle-0.5,s.angle);ctx.closePath();ctx.fill();
      }
      // Sweep line
      ctx.globalAlpha=alpha*0.9;ctx.strokeStyle=col2;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(W/2,cy);ctx.lineTo(W/2+Math.cos(s.angle)*sz,cy+Math.sin(s.angle)*sz);ctx.stroke();
      // Ping dots
      s.dots.forEach(d=>{
        const dx=W/2+Math.cos(d.a)*d.r,dy=cy+Math.sin(d.a)*d.r;
        ctx.globalAlpha=alpha*d.life*0.9;ctx.fillStyle=col2;
        ctx.beginPath();ctx.arc(dx,dy,3,0,Math.PI*2);ctx.fill();
        ctx.shadowColor=col2;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
      });
      ctx.restore();break;}

    case 'tv_static':{
      if(alpha<=0)break;
      const scale=Math.round(p('scale'))||2;
      const cols=Math.ceil(W/scale),rows=Math.ceil(H/scale);
      const id=ctx.createImageData(cols,rows);
      for(let i=0;i<id.data.length;i+=4){const v=(Math.random()*255)|0;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=255;}
      const tmp=document.createElement('canvas');tmp.width=cols;tmp.height=rows;
      tmp.getContext('2d').putImageData(id,0,0);
      ctx.save();ctx.globalAlpha=alpha*p('alpha')/100;
      ctx.imageSmoothingEnabled=false;ctx.drawImage(tmp,0,0,W,H);
      ctx.restore();break;}

    // ── Atmospheric ────────────────────────────────────────────────────────
    case 'star_field':{
      if(!layer._state){
        const cnt=Math.round(p('count'));
        layer._state=Array.from({length:cnt},()=>({
          x:Math.random()*W,y:Math.random()*H,
          z:Math.random(),size:Math.random()*(p('size')||1.5),
          twinkle:Math.random()*Math.PI*2,
        }));
      }
      const col=hex2rgb(p('color')),spd=p('speed')||1;
      ctx.save();
      for(const s of layer._state){
        s.twinkle+=0.03;s.y+=spd*(0.2+s.z*0.8)*0.5;
        if(s.y>H){s.y=0;s.x=Math.random()*W;}
        const tw=0.5+0.5*Math.sin(s.twinkle);
        ctx.globalAlpha=applyFadeOut((0.3+s.z*0.7)*tw,elapsed,D);
        ctx.fillStyle=`rgb(${col.r},${col.g},${col.b})`;
        ctx.beginPath();ctx.arc(s.x,s.y,s.size*(0.5+s.z*0.5),0,Math.PI*2);ctx.fill();
      }
      ctx.restore();break;}

    case 'aurora':{
      const t=elapsed/1000*p('speed');
      const bands=Math.round(p('bands'))||3;
      const col1=hex2rgb(p('color1')),col2=hex2rgb(p('color2'));
      const a=applyFadeOut(p('alpha')/100*0.5,elapsed,D);
      ctx.save();
      for(let b=0;b<bands;b++){
        const phase=b*Math.PI*2/bands;
        const yBase=H*(0.15+b*0.12);
        const waveH=60+30*Math.sin(t*0.7+phase);
        const mix=b/Math.max(bands-1,1);
        const r=Math.round(col1.r*(1-mix)+col2.r*mix);
        const g2=Math.round(col1.g*(1-mix)+col2.g*mix);
        const bv=Math.round(col1.b*(1-mix)+col2.b*mix);
        const grad=ctx.createLinearGradient(0,yBase,0,yBase+waveH+80);
        grad.addColorStop(0,'transparent');
        grad.addColorStop(0.3,`rgba(${r},${g2},${bv},${a})`);
        grad.addColorStop(0.7,`rgba(${r},${g2},${bv},${a*0.4})`);
        grad.addColorStop(1,'transparent');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.moveTo(0,yBase);
        for(let x=0;x<=W;x+=20){
          const wave=Math.sin(x/W*Math.PI*3+t+phase)*waveH;
          ctx.lineTo(x,yBase+wave);
        }
        ctx.lineTo(W,yBase+waveH+80);ctx.lineTo(0,yBase+waveH+80);ctx.closePath();ctx.fill();
      }
      ctx.restore();break;}

    // ── Text / Motion ──────────────────────────────────────────────────────
    case 'typewriter':{
      if(alpha<=0)break;
      const src=p('text')||title()||'';
      const charCount=Math.round(layerProg(layer,elapsed,D)*src.length);
      const shown=src.slice(0,charCount);
      const cursor=p('cursor')&&elapsed%(1000/1.2)<600;
      const display=shown+(cursor?'▌':'');
      if(!display)break;
      ctx.save();ctx.globalAlpha=alpha;
      ctx.font=`${p('size')}px 'Bebas Neue',sans-serif`;
      ctx.fillStyle=p('color');ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(display,W/2,H/2+p('y_off'));
      ctx.restore();break;}

    case 'counter':{
      if(alpha<=0)break;
      const from=p('from')??0,to=p('to')??100;
      const val=Math.round(lerp(from,to,easeOut3(layerProg(layer,elapsed,D))));
      const display=`${p('prefix')||''}${val}${p('suffix')||''}`;
      ctx.save();ctx.globalAlpha=alpha;
      ctx.font=`${p('size')}px 'Bebas Neue',sans-serif`;
      ctx.fillStyle=p('color');ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(display,W/2,H/2+p('y_off'));
      ctx.restore();break;}

    // ── Custom Text ────────────────────────────────────────────────────────
    case 'custom_text':{
      if(alpha<=0)break;
      const src=p('text')||'';
      if(!src)break;
      const fontName=p('font')||'Bebas Neue';
      const sz=p('size')||64;
      const col=p('color')||'#ffffff';
      const xOff=p('x_off')||0;
      const yOff=p('y_off')||0;
      const alignIdx=p('align')||0;
      const spacing=p('spacing')||0;
      const animIdx=p('anim')||0;
      const strokeW=p('stroke_w')||0;
      const strokeCol=p('stroke_color')||'#000000';
      const shadowBlur=p('shadow_blur')||0;
      const shadowCol=p('shadow_color')||'#000000';
      const eased=easeOut3(layerProg(layer,elapsed,D));
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.font=`${sz}px '${fontName}',sans-serif`;
      const alignMap=['center','left','right'];
      ctx.textAlign=alignMap[alignIdx]||'center';
      ctx.textBaseline='middle';
      const cx=W/2+xOff+(alignIdx===1?-W/2+40:alignIdx===2?W/2-40:0);
      const cy=H/2+yOff;
      if(shadowBlur>0){ctx.shadowBlur=shadowBlur;ctx.shadowColor=shadowCol;}
      // Apply letter spacing by drawing char by char
      const applySpacing=(text,drawFn)=>{
        if(spacing===0){drawFn(text,0);return;}
        ctx.textAlign='left';
        const totalW=ctx.measureText(text).width+(text.length-1)*spacing;
        let startX=alignIdx===0?cx-totalW/2:alignIdx===2?cx-totalW:cx;
        for(let i=0;i<text.length;i++){
          const ch=text[i];drawFn(ch,startX);startX+=ctx.measureText(ch).width+spacing;
        }
      };
      // Animation transforms
      ctx.save();
      if(animIdx===1){// Slide Up
        ctx.translate(0,lerp(30,0,eased));
      } else if(animIdx===2){// Wipe L→R
        const clipW=lerp(0,W,eased);
        ctx.beginPath();ctx.rect(0,0,clipW,H);ctx.clip();
      } else if(animIdx===3){// Scale In
        const sc=lerp(0.6,1,eased);
        ctx.translate(cx,cy);ctx.scale(sc,sc);ctx.translate(-cx,-cy);
      }
      if(strokeW>0){
        ctx.strokeStyle=strokeCol;ctx.lineWidth=strokeW;
        if(spacing!==0)applySpacing(src,(ch,x)=>ctx.strokeText(ch,x,cy));
        else ctx.strokeText(src,cx,cy);
      }
      ctx.fillStyle=col;
      if(spacing!==0)applySpacing(src,(ch,x)=>ctx.fillText(ch,x,cy));
      else ctx.fillText(src,cx,cy);
      ctx.restore();
      ctx.restore();break;}

    // ── Shake ──────────────────────────────────────────────────────────────
    case 'camera_shake':{
      if(alpha<=0)break;
      const intensity=p('intensity')||15;
      const speed=(p('speed')||5)*0.05;
      // Deterministic per-frame jitter using elapsed as seed (changes every frame)
      const t=elapsed*speed;
      const sx=(Math.sin(t*7.3+1.1)*0.5+Math.sin(t*13.1+2.7)*0.5)*intensity*alpha;
      const sy=(Math.sin(t*5.9+0.4)*0.5+Math.sin(t*11.7+3.9)*0.5)*intensity*alpha;
      ctx.translate(sx,sy);
      break;}

    // ── Light Effects ──────────────────────────────────────────────────────
    case 'light_rays':{
      if(alpha<=0)break;
      const srcX=W*p('x_pos')/100;
      const srcY=H*p('y_pos')/100;
      const count=Math.round(p('count')||8);
      const spreadRad=(p('spread')||70)*Math.PI/180;
      const len=Math.max(W,H)*(p('length')||90)/100;
      const rayW=(p('width')||30);
      const col=hex2rgb(p('color')||'#ffffff');
      const a=alpha*(p('alpha')||40)/100*0.4;
      ctx.save();
      // Base angle points downward from source
      const baseAngle=Math.PI/2;
      for(let i=0;i<count;i++){
        const t=count===1?0:(i/(count-1)-0.5);
        const angle=baseAngle+t*spreadRad;
        const ex=srcX+Math.cos(angle)*len;
        const ey=srcY+Math.sin(angle)*len;
        const halfW=rayW*(0.5+Math.random()*0.5);
        const px=-Math.sin(angle)*halfW;
        const py=Math.cos(angle)*halfW;
        const grad=ctx.createLinearGradient(srcX,srcY,ex,ey);
        grad.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${a})`);
        grad.addColorStop(1,`rgba(${col.r},${col.g},${col.b},0)`);
        ctx.beginPath();
        ctx.moveTo(srcX,srcY);
        ctx.lineTo(ex+px,ey+py);
        ctx.lineTo(ex-px,ey-py);
        ctx.closePath();
        ctx.fillStyle=grad;
        ctx.fill();
      }
      ctx.restore();break;}

    case 'spot_light':{
      if(alpha<=0)break;
      const radius=p('radius')||200;
      const yPos=H*p('y_pos')/100;
      const xFrom=W*p('x_from')/100;
      const xTo=W*p('x_to')/100;
      const col=hex2rgb(p('color')||'#ffffff');
      const intensity=alpha*(p('intensity')||60)/100;
      // Position: if sweep, lerp using layerProg; otherwise center
      const prog=p('sweep')?layerProg(layer,elapsed,D):0.5;
      const cx=lerp(xFrom,xTo,prog);
      ctx.save();
      const grad=ctx.createRadialGradient(cx,yPos,0,cx,yPos,radius);
      grad.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${intensity})`);
      grad.addColorStop(0.4,`rgba(${col.r},${col.g},${col.b},${intensity*0.4})`);
      grad.addColorStop(1,`rgba(${col.r},${col.g},${col.b},0)`);
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,W,H);
      ctx.restore();break;}

    case 'lens_flare':{
      if(alpha<=0)break;
      const fx=W*p('x_pos')/100;
      const fy=H*p('y_pos')/100;
      const scale=(p('scale')||100)/100;
      const col=hex2rgb(p('color')||'#ffffff');
      const intensity=alpha*(p('intensity')||70)/100;
      ctx.save();
      // Main glow
      const g0=ctx.createRadialGradient(fx,fy,0,fx,fy,120*scale);
      g0.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${intensity})`);
      g0.addColorStop(0.15,`rgba(${col.r},${col.g},${col.b},${intensity*0.5})`);
      g0.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g0;ctx.fillRect(0,0,W,H);
      // Anamorphic streak
      ctx.globalAlpha=intensity*0.5;
      const sg=ctx.createLinearGradient(fx-300*scale,fy,fx+300*scale,fy);
      sg.addColorStop(0,'rgba(0,0,0,0)');sg.addColorStop(0.5,`rgba(${col.r},${col.g},${col.b},1)`);sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sg;ctx.fillRect(fx-300*scale,fy-3*scale,600*scale,6*scale);
      // Secondary artifacts along axis toward center
      const ax=W/2-fx, ay=H/2-fy;
      [[0.3,40],[0.5,25],[0.7,60],[0.9,15],[1.1,35]].forEach(([t,r])=>{
        const ox=fx+ax*t, oy=fy+ay*t, rs=r*scale;
        const rg=ctx.createRadialGradient(ox,oy,0,ox,oy,rs);
        rg.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${intensity*0.6})`);
        rg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.globalAlpha=intensity*0.4;ctx.fillStyle=rg;
        ctx.beginPath();ctx.arc(ox,oy,rs,0,Math.PI*2);ctx.fill();
      });
      ctx.restore();break;}

    // ── Transitions ────────────────────────────────────────────────────────
    case 'crt_startup':{
      const prog=layerProg(layer,elapsed,D);
      if(!p('reverse')&&prog>=1)break; // normal: fully open — show nothing
      if(p('reverse')&&prog<=0)break;  // reversed: fully collapsed — show nothing
      const eased=easeOut5(prog);
      // At prog=0: just a bright line. At prog=1: full reveal.
      const minLineH=2;
      const revealH=lerp(minLineH,H,eased);
      const topY=(H-revealH)/2;
      const bg=bgHex||'#000';
      ctx.save();
      // Black masks above and below the expanding strip
      ctx.fillStyle=bg;
      ctx.fillRect(0,0,W,topY);
      ctx.fillRect(0,topY+revealH,W,H);
      // Edge glow lines
      const glowAmt=p('glow')/100;
      if(glowAmt>0){
        const col=hex2rgb(p('color'));
        const glowH=Math.min(40,revealH*0.3);
        // Top edge
        const gt=ctx.createLinearGradient(0,topY,0,topY+glowH);
        gt.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${glowAmt})`);
        gt.addColorStop(1,'transparent');
        ctx.fillStyle=gt;ctx.fillRect(0,topY,W,glowH);
        // Bottom edge
        const gb=ctx.createLinearGradient(0,topY+revealH-glowH,0,topY+revealH);
        gb.addColorStop(0,'transparent');
        gb.addColorStop(1,`rgba(${col.r},${col.g},${col.b},${glowAmt})`);
        ctx.fillStyle=gb;ctx.fillRect(0,topY+revealH-glowH,W,glowH);
        // Center bright line when nearly closed
        if(prog<0.15){
          const lp=1-prog/0.15;
          ctx.fillStyle=`rgba(${col.r},${col.g},${col.b},${glowAmt*lp})`;
          ctx.fillRect(0,H/2-1,W,3);
        }
      }
      // Flicker: random noise bands during opening
      if(p('flicker')&&prog<0.7&&Math.random()<0.3){
        const noiseY=topY+Math.random()*revealH;
        const noiseH=2+Math.random()*6;
        ctx.globalAlpha=0.15+Math.random()*0.2;
        ctx.fillStyle=`rgba(255,255,255,1)`;
        ctx.fillRect(0,noiseY,W,noiseH);
      }
      ctx.restore();break;}
  }
}

// Render all custom layers in order
function renderCustom(elapsed){
  const D=duration*1000;
  ctx.setTransform(1,0,0,1,0,0); // reset any camera_shake transform from previous frame
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=bgHex;ctx.fillRect(0,0,W,H);
  if(customLayers.length===0){
    ctx.save();ctx.globalAlpha=0.15;ctx.font=`14px 'DM Mono',monospace`;ctx.fillStyle=accentHex;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Add layers to start',W/2,H/2);ctx.restore();
    return;
  }
  for(const layer of customLayers)renderLayer(layer,elapsed,D);
  fireEvents(elapsed);
}

const CUSTOM_TPL = {id:'custom',name:'Custom',icon:'✦'};

// ═══════════════════════════════════════════════════════════════════════════════
// CUSTOM TEMPLATE STATE
// ═══════════════════════════════════════════════════════════════════════════════
let customLayers = [];
let selectedLayerIdx = -1;
let activeTpl = TEMPLATES[0];

const CUSTOM_STORAGE = 'vfxlab_custom_intros';
function getSavedCustom(){try{return JSON.parse(localStorage.getItem(CUSTOM_STORAGE)||'[]');}catch{return [];}}
function saveCustomTemplates(arr){localStorage.setItem(CUSTOM_STORAGE,JSON.stringify(arr));}

// ─── Template grid ────────────────────────────────────────────────────────────
const tplGrid = document.getElementById('template-grid');
const allTpls = [...TEMPLATES, CUSTOM_TPL];
allTpls.forEach(tpl => {
  const card = document.createElement('div');
  card.className = 'tpl-card' + (tpl===activeTpl?' active':'');
  card.dataset.id = tpl.id;
  card.innerHTML = `<div class="tc-icon">${tpl.icon}</div><div class="tc-name">${tpl.name}</div>`;
  card.addEventListener('click', () => {
    document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    activeTpl = tpl;
    particles=[];rings=[];rainDrops=[];dataStreams=[];
    document.getElementById('layers-section').style.display = tpl===CUSTOM_TPL ? 'block' : 'none';
    if(tpl===CUSTOM_TPL){
      buildLayerList();buildTimeline();
      if(selectedLayerIdx>=0)buildLayerParams(selectedLayerIdx);
      else showParamsHint();
    } else {
      buildTemplateParams(tpl);
    }
    renderPreview();
  });
  tplGrid.appendChild(card);
});

// ─── Layer list ───────────────────────────────────────────────────────────────
function buildLayerList(){
  const list=document.getElementById('layer-list');
  if(customLayers.length===0){list.innerHTML='<div class="no-layers">No layers yet</div>';return;}
  list.innerHTML='';
  let dragSrcIdx=null;
  customLayers.forEach((layer,idx)=>{
    const def=LAYER_DEFS.find(d=>d.type===layer.type);
    const chip=document.createElement('div');
    chip.className='layer-chip'+(idx===selectedLayerIdx?' active':'');
    chip.draggable=true;chip.dataset.idx=idx;
    chip.innerHTML=`<div class="chip-drag">⣿</div><div class="chip-type-icon">${def.icon}</div><span class="chip-name">${def.name}</span><span class="chip-remove" data-idx="${idx}">✕</span>`;
    chip.addEventListener('click',e=>{
      if(e.target.classList.contains('chip-remove'))return;
      selectedLayerIdx=idx;buildLayerList();buildLayerParams(idx);
    });
    chip.addEventListener('dragstart',e=>{dragSrcIdx=idx;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');dragSrcIdx=null;});
    chip.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';chip.classList.add('drag-over-chip');});
    chip.addEventListener('dragleave',()=>chip.classList.remove('drag-over-chip'));
    chip.addEventListener('drop',e=>{
      e.preventDefault();chip.classList.remove('drag-over-chip');
      if(dragSrcIdx===null||dragSrcIdx===idx)return;
      const moved=customLayers.splice(dragSrcIdx,1)[0];customLayers.splice(idx,0,moved);
      if(selectedLayerIdx===dragSrcIdx)selectedLayerIdx=idx;
      buildLayerList();buildTimeline();renderPreview();
    });
    chip.querySelector('.chip-remove').addEventListener('click',()=>{
      customLayers.splice(idx,1);
      if(selectedLayerIdx>=customLayers.length)selectedLayerIdx=customLayers.length-1;
      buildLayerList();buildTimeline();
      if(selectedLayerIdx>=0)buildLayerParams(selectedLayerIdx);else showParamsHint();
      renderPreview();
    });
    list.appendChild(chip);
  });
}

function addLayer(type){
  const layer=createLayer(type);
  customLayers.push(layer);
  selectedLayerIdx=customLayers.length-1;
  buildLayerList();buildTimeline();buildLayerParams(selectedLayerIdx);
  document.getElementById('layer-picker').style.display='none';
  document.getElementById('btn-toggle-picker').textContent='+ Add Layer';
  renderPreview();
}

// Build layer type picker
const pickerGrid = document.getElementById('layer-type-grid');
LAYER_DEFS.forEach(def=>{
  const card=document.createElement('div');
  card.className='layer-type-card';
  card.innerHTML=`<div class="ltc-icon">${def.icon}</div><div class="ltc-name">${def.name}</div>`;
  card.addEventListener('click',()=>addLayer(def.type));
  pickerGrid.appendChild(card);
});

document.getElementById('btn-toggle-picker').addEventListener('click',()=>{
  const picker=document.getElementById('layer-picker');
  const open=picker.style.display==='none';
  picker.style.display=open?'block':'none';
  document.getElementById('btn-toggle-picker').textContent=open?'✕ Cancel':'+ Add Layer';
});

// ─── Params panel ─────────────────────────────────────────────────────────────
function showParamsHint(){
  document.getElementById('params-label').textContent='Parameters';
  document.getElementById('params-body').innerHTML='<div class="params-hint">Select a layer to edit its params</div>';
}

function buildParamsBody(params, onChange){
  const body=document.getElementById('params-body');
  body.innerHTML='';
  params.forEach(param=>{
    const row=document.createElement('div');
    if(param.type==='range'){
      row.className='param-row';
      const step=param.step||(Math.abs((param.max||100)-(param.min||0))>=50?1:0.5);
      row.innerHTML=`<span class="param-name">${param.label}</span><input type="range" min="${param.min}" max="${param.max}" value="${param.value}" step="${step}" data-key="${param.key}"><span class="param-val">${param.value}${param.unit||''}</span>`;
      const slider=row.querySelector('input'),valEl=row.querySelector('.param-val');
      slider.addEventListener('input',()=>{param.value=parseFloat(slider.value);valEl.textContent=param.value+(param.unit||'');onChange();});
    } else if(param.type==='toggle'){
      row.className='toggle-row';
      row.innerHTML=`<span class="toggle-label">${param.label}</span><div class="toggle ${param.value?'on':''}" data-key="${param.key}"></div>`;
      const tog=row.querySelector('.toggle');
      tog.addEventListener('click',()=>{param.value=!param.value;tog.classList.toggle('on',param.value);onChange();});
    } else if(param.type==='color'){
      row.className='color-param-row';
      row.innerHTML=`<span class="param-name">${param.label}</span><input type="color" value="${param.value}" data-key="${param.key}">`;
      const inp=row.querySelector('input');
      inp.addEventListener('input',()=>{param.value=inp.value;onChange();});
    } else if(param.type==='select'){
      row.className='param-row';
      row.innerHTML=`<span class="param-name">${param.label}</span><select class="param-select" data-key="${param.key}">${param.options.map((o,i)=>`<option value="${i}"${param.value===i?' selected':''}>${o}</option>`).join('')}</select>`;
      const sel=row.querySelector('select');
      sel.addEventListener('change',()=>{param.value=parseInt(sel.value);onChange();});
    } else if(param.type==='text'){
      row.className='param-row';
      row.innerHTML=`<span class="param-name">${param.label}</span><input type="text" class="param-text" value="${param.value||''}" placeholder="uses title if blank" data-key="${param.key}">`;
      const inp=row.querySelector('input');
      inp.addEventListener('input',()=>{param.value=inp.value;onChange();});
    } else if(param.type==='font_select'){
      row.className='param-row';
      row.innerHTML=`<span class="param-name">${param.label}</span>
        <div class="font-row">
          <select class="param-select">${getAllFonts().map(f=>`<option value="${f}"${param.value===f?' selected':''}>${f}</option>`).join('')}</select>
          <button class="btn btn-ghost btn-xs" title="Upload font file">↑</button>
          <input type="file" accept=".ttf,.otf,.woff,.woff2" style="display:none">
        </div>`;
      const sel=row.querySelector('select');
      const fileInp=row.querySelector('input[type=file]');
      const uploadBtn=row.querySelector('button');
      sel.addEventListener('change',async()=>{param.value=sel.value;await ensureFont(sel.value);onChange();});
      uploadBtn.addEventListener('click',()=>fileInp.click());
      fileInp.addEventListener('change',async()=>{
        const f=fileInp.files[0];if(!f)return;fileInp.value='';
        const name=await loadCustomFont(f);
        const opt=document.createElement('option');opt.value=name;opt.textContent=name;
        sel.appendChild(opt);sel.value=name;param.value=name;onChange();
      });
    }
    body.appendChild(row);
  });
}

function buildLayerParams(idx){
  const layer=customLayers[idx];
  if(!layer)return;
  const def=LAYER_DEFS.find(d=>d.type===layer.type);
  document.getElementById('params-label').textContent=`${def.icon} ${def.name}`;
  // Split timing params from visual params
  const timingKeys=['trigger_at','exit_at','anim_in','anim_out','reverse'];
  const timingParams=layer.params.filter(p=>timingKeys.includes(p.key));
  const visualParams=layer.params.filter(p=>!timingKeys.includes(p.key));
  const allParams=[...timingParams,...visualParams];
  buildParamsBody(allParams,()=>{buildTimeline();renderPreview();});
}

function buildTemplateParams(tpl){
  document.getElementById('params-label').textContent=`${tpl.icon} ${tpl.name}`;
  buildParamsBody(tpl.params,()=>{renderPreview();});
}

// Init params for first template
buildTemplateParams(activeTpl);

// ─── Save/load custom templates ───────────────────────────────────────────────
function refreshSavedList(){
  const saved=getSavedCustom();
  const list=document.getElementById('saved-tpl-list');
  list.innerHTML='';
  saved.forEach(s=>{
    const chip=document.createElement('div');chip.className='saved-tpl-chip';
    chip.innerHTML=`<span>${s.name}</span><span class="saved-tpl-del" data-name="${s.name}">✕</span>`;
    chip.querySelector('span:first-child').addEventListener('click',()=>{
      customLayers=s.layers.map(l=>({...l,params:l.params.map(p=>({...p})),_fired:false}));
      selectedLayerIdx=-1;buildLayerList();buildTimeline();showParamsHint();renderPreview();
    });
    chip.querySelector('.saved-tpl-del').addEventListener('click',e=>{
      e.stopPropagation();const arr=getSavedCustom().filter(t=>t.name!==s.name);saveCustomTemplates(arr);refreshSavedList();
    });
    list.appendChild(chip);
  });
}
refreshSavedList();

document.getElementById('btn-save-custom').addEventListener('click',()=>{
  if(customLayers.length===0)return;
  const name=prompt('Template name:');if(!name?.trim())return;
  const arr=getSavedCustom().filter(t=>t.name!==name.trim());
  arr.push({name:name.trim(),layers:customLayers.map(l=>({...l,params:l.params.map(p=>({...p})),_fired:false}))});
  saveCustomTemplates(arr);refreshSavedList();
});

document.getElementById('btn-export-layers').addEventListener('click',()=>{
  if(customLayers.length===0)return;
  const payload=JSON.stringify(customLayers.map(l=>({...l,params:l.params.map(p=>({...p})),_fired:false})),null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(payload);
  a.download='intro-layers.json';a.click();
