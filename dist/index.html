const importLayersFile=document.getElementById('import-layers-file');
document.getElementById('btn-import-layers').addEventListener('click',()=>importLayersFile.click());
importLayersFile.addEventListener('change',()=>{
  const f=importLayersFile.files[0];if(!f)return;
  importLayersFile.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    let layers;
    try{layers=JSON.parse(e.target.result);}catch{alert('Invalid JSON file.');return;}
    if(!Array.isArray(layers)||layers.some(l=>!l.type)){alert('Not a valid layers file.');return;}
    // Sanitize: only keep known keys, reset runtime state
    const defs={};LAYER_DEFS.forEach(d=>defs[d.type]=d);
    const TIMED_DEFS=[
      {key:'anim_in',   label:'Fade In (ms)',  type:'range', min:0,max:2000,value:500,step:50,unit:'ms'},
      {key:'anim_out',  label:'Fade Out (ms)', type:'range', min:0,max:2000,value:400,step:50,unit:'ms'},
      {key:'trigger_at',label:'Trigger (0→1)', type:'range', min:0,max:1,value:0,step:0.01,unit:''},
      {key:'exit_at',   label:'Exit (0→1)',    type:'range', min:0,max:1,value:1,step:0.01,unit:''},
      {key:'reverse',   label:'Reverse',       type:'toggle',value:false},
    ];
    customLayers=layers.flatMap(l=>{
      const def=defs[l.type];if(!def)return[];
      const params=def.params.map(dp=>{
        const saved=l.params?.find(p=>p.key===dp.key);
        return saved?{...dp,value:saved.value}:{...dp};
      });
      if(def.timed){
        TIMED_DEFS.slice().reverse().forEach(td=>{
          const saved=l.params?.find(p=>p.key===td.key);
          params.unshift({...td,value:saved?.value??td.value});
        });
      }
      return[{...l,params,_fired:false}];
    });
    selectedLayerIdx=-1;buildLayerList();buildTimeline();showParamsHint();
    renderPreview();
  };
  reader.readAsText(f);
});

// ─── Timeline Editor ──────────────────────────────────────────────────────────
const TL_LABEL_W = 110;
let tlDrag = null;
let tlElapsed = 0;

function tlTrackWidth(){
  const r=document.getElementById('tl-ruler');
  return r?r.clientWidth:1;
}

function buildTimeline(){
  if(!document.body.classList.contains('tl-open'))return;
  const ruler=document.getElementById('tl-ruler');
  const tracks=document.getElementById('tl-tracks');
  if(!ruler||!tracks)return;

  // Ruler ticks
  ruler.innerHTML='';
  const steps=Math.ceil(duration);
  for(let i=0;i<=steps;i++){
    const pct=(i/duration*100).toFixed(3)+'%';
    const tick=document.createElement('div');
    tick.className='tl-tick';tick.style.left=pct;
    ruler.appendChild(tick);
    const lbl=document.createElement('span');
    lbl.className='tl-tick-label';lbl.style.left=pct;lbl.textContent=i+'s';
    ruler.appendChild(lbl);
  }

  // Layer rows
  tracks.innerHTML='';
  if(activeTpl!==CUSTOM_TPL){
    const hint=document.createElement('div');
    hint.style.cssText='padding:10px 12px;font-size:9px;color:var(--muted);letter-spacing:1px;';
    hint.textContent='Switch to Custom template to edit layer timing.';
    tracks.appendChild(hint);
    updateTlPlayhead(tlElapsed);return;
  }

  customLayers.forEach((layer,idx)=>{
    const def=LAYER_DEFS.find(d=>d.type===layer.type);
    const gp=key=>layer.params.find(pp=>pp.key===key)?.value;

    const row=document.createElement('div');
    row.className='tl-row';

    const lbl=document.createElement('div');
    lbl.className='tl-label';
    lbl.textContent=(def?.icon||'')+(def?.name||layer.type);
    lbl.title=def?.name||layer.type;
    // Click label to select layer
    lbl.style.cursor='pointer';
    lbl.addEventListener('click',()=>{
      selectedLayerIdx=idx;buildLayerList();buildLayerParams(idx);
    });
    row.appendChild(lbl);

    const track=document.createElement('div');
    track.className='tl-track';

    const bar=document.createElement('div');
    if(!def?.timed){
      bar.className='tl-bar non-timed';
    } else {
      const trigAt=gp('trigger_at')??0;
      const exitAt=gp('exit_at')??1;
      bar.className='tl-bar';
      bar.style.left=(trigAt*100).toFixed(3)+'%';
      bar.style.right=((1-exitAt)*100).toFixed(3)+'%';
      bar.title=`In: ${(trigAt*duration).toFixed(2)}s  Out: ${(exitAt*duration).toFixed(2)}s`;

      const hl=document.createElement('div');hl.className='tl-handle left';hl.title='Drag: set entry time';
      const hr=document.createElement('div');hr.className='tl-handle right';hr.title='Drag: set exit time';

      hl.addEventListener('mousedown',e=>{
        e.preventDefault();e.stopPropagation();
        tlDrag={idx,type:'trigger',startX:e.clientX,startVal:gp('trigger_at')??0};
      });
      hr.addEventListener('mousedown',e=>{
        e.preventDefault();e.stopPropagation();
        tlDrag={idx,type:'exit',startX:e.clientX,startVal:gp('exit_at')??1};
      });
      bar.addEventListener('mousedown',e=>{
        if(e.target.classList.contains('tl-handle'))return;
        e.preventDefault();
        const trig=gp('trigger_at')??0,exit=gp('exit_at')??1;
        tlDrag={idx,type:'move',startX:e.clientX,startTrigger:trig,startExit:exit,span:exit-trig};
      });
      bar.appendChild(hl);bar.appendChild(hr);
    }
    track.appendChild(bar);
    row.appendChild(track);
    tracks.appendChild(row);
  });

  updateTlPlayhead(tlElapsed);
}

function setTlParam(layer,key,val){
  const pd=layer.params.find(p=>p.key===key);
  if(pd)pd.value=Math.round(clamp(val,0,1)*1000)/1000;
}

document.addEventListener('mousemove',e=>{
  if(!tlDrag)return;
  const tw=tlTrackWidth();if(tw===0)return;
  const dx=(e.clientX-tlDrag.startX)/tw;
  const layer=customLayers[tlDrag.idx];if(!layer)return;
  if(tlDrag.type==='trigger'){
    const exit=layer.params.find(p=>p.key==='exit_at')?.value??1;
    setTlParam(layer,'trigger_at',clamp(tlDrag.startVal+dx,0,exit-0.02));
  } else if(tlDrag.type==='exit'){
    const trig=layer.params.find(p=>p.key==='trigger_at')?.value??0;
    setTlParam(layer,'exit_at',clamp(tlDrag.startVal+dx,trig+0.02,1));
  } else if(tlDrag.type==='move'){
    const nt=clamp(tlDrag.startTrigger+dx,0,1-tlDrag.span);
    setTlParam(layer,'trigger_at',nt);
    setTlParam(layer,'exit_at',nt+tlDrag.span);
  }
  buildTimeline();
  if(selectedLayerIdx===tlDrag.idx)buildLayerParams(selectedLayerIdx);
  if(!isPlaying)renderFrame(tlElapsed);
});
document.addEventListener('mouseup',()=>{tlDrag=null;});

function updateTlPlayhead(elapsed){
  tlElapsed=elapsed;
  const ph=document.getElementById('tl-playhead');
  const td=document.getElementById('tl-time-display');
  if(!ph)return;
  const pct=clamp(elapsed/(duration*1000),0,1);
  ph.style.left=(TL_LABEL_W+pct*tlTrackWidth())+'px';
  if(td)td.textContent=(elapsed/1000).toFixed(1)+'s';
}

document.getElementById('btn-timeline').addEventListener('click',()=>{
  document.body.classList.toggle('tl-open');
  buildTimeline();
});
document.getElementById('tl-close').addEventListener('click',()=>{
  document.body.classList.remove('tl-open');
});

// ─── Render dispatch ──────────────────────────────────────────────────────────
function renderFrame(elapsed){
  if(activeTpl===CUSTOM_TPL){renderCustom(elapsed);}
  else{activeTpl.render(elapsed);}
}

// ─── Playback ─────────────────────────────────────────────────────────────────
const btnPlay=document.getElementById('btn-play');
const btnPause=document.getElementById('btn-pause');
const btnStop=document.getElementById('btn-stop');
const progressBar=document.getElementById('progress-bar');
const timeLabel=document.getElementById('time-label');

function setPlaybackBtns({playing,paused}){
  btnPlay.disabled=playing&&!paused;
  btnPause.disabled=!playing;
  btnPause.textContent=paused?'▶ Resume':'⏸ Pause';
  btnStop.disabled=!playing&&!paused;
  document.getElementById('btn-record').disabled=playing||paused;
}

// Render at current scrub position (paused frame) or frame 0 if not paused
function renderPreview(){if(!isPlaying)renderFrame(isPaused?pausedAt:0);}

function stopPlayback(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  isPlaying=false;isPaused=false;pausedAt=0;
  setPlaybackBtns({playing:false,paused:false});
  renderFrame(0);progressBar.style.width='0%';timeLabel.textContent='0.0s';
}

function pausePlayback(){
  if(!isPlaying||isPaused)return;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  isPaused=true;isPlaying=false;
  setPlaybackBtns({playing:true,paused:true});
}

function resumePlayback(onEnd){
  if(!isPaused)return;
  isPaused=false;isPlaying=true;
  startTime=performance.now()-pausedAt;
  setPlaybackBtns({playing:true,paused:false});
  runLoop(onEnd);
}

function runLoop(onEnd){
  function loop(now){
    const elapsed=now-startTime,D=duration*1000;
    pausedAt=elapsed;
    renderFrame(elapsed);
    progressBar.style.width=`${Math.min(elapsed/D*100,100)}%`;
    timeLabel.textContent=`${(elapsed/1000).toFixed(1)}s`;
    updateTlPlayhead(elapsed);
    if(elapsed<D){rafId=requestAnimationFrame(loop);}
    else{rafId=null;if(onEnd)onEnd();else stopPlayback();}
  }
  rafId=requestAnimationFrame(loop);
}

function startPlayback(onEnd){
  particles=[];rings=[];rainDrops=[];dataStreams=[];events=[];
  pausedAt=0;
  if(activeTpl===CUSTOM_TPL){
    customLayers.forEach(l=>{l._fired=false;l._state=null;});
    customLayers.forEach(l=>{
      if(l.type==='custom_text'){const f=l.params.find(p=>p.key==='font')?.value;if(f)ensureFont(f);}
    });
    customLayers.forEach(l=>{
      if(l.type==='data_streams')initDataStreams(Math.round(l.params.find(p=>p.key==='count')?.value??20));
      if(l.type==='rain')initRain(Math.round(l.params.find(p=>p.key==='count')?.value??80));
    });
  } else {
    activeTpl.initPlayback?.();
  }
  startTime=performance.now();isPlaying=true;isPaused=false;
  setPlaybackBtns({playing:true,paused:false});
  runLoop(onEnd);
}

btnPlay.addEventListener('click',()=>startPlayback());
btnPause.addEventListener('click',()=>{if(isPaused)resumePlayback();else pausePlayback();});
btnStop.addEventListener('click',stopPlayback);

// ─── Recording ────────────────────────────────────────────────────────────────
document.getElementById('btn-record').addEventListener('click',()=>{
  const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const stream=canvas.captureStream(fps);const recorder=new MediaRecorder(stream,{mimeType});const chunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'}),blobUrl=URL.createObjectURL(blob);
    const modal=document.getElementById('record-modal'),videoEl=document.getElementById('record-preview');
    videoEl.src=blobUrl;modal.style.display='flex';
    setPlaybackBtns({playing:false,paused:false});
    document.getElementById('btn-record').disabled=false;document.getElementById('btn-record').textContent='⏺ Record';
    progressBar.style.width='0%';timeLabel.textContent='0.0s';
    document.getElementById('modal-download').onclick=()=>{const a=document.createElement('a');a.download='vfxlab-intro.webm';a.href=blobUrl;a.click();closeModal(blobUrl,videoEl,modal);};
    document.getElementById('modal-discard').onclick=()=>closeModal(blobUrl,videoEl,modal);
    document.getElementById('modal-close').onclick=()=>closeModal(blobUrl,videoEl,modal);
    modal.onclick=e=>{if(e.target===modal)closeModal(blobUrl,videoEl,modal);};
  };
  const btnRec=document.getElementById('btn-record');btnRec.disabled=true;btnPause.disabled=true;btnPlay.disabled=true;btnRec.textContent='⏺ …';
  recorder.start();startPlayback(()=>recorder.stop());
});
function closeModal(blobUrl,videoEl,modal){modal.style.display='none';videoEl.src='';URL.revokeObjectURL(blobUrl);}

// ─── Logo upload ──────────────────────────────────────────────────────────────
const logoDrop=document.getElementById('logo-drop'),logoFile=document.getElementById('logo-file'),logoThumb=document.getElementById('logo-thumb');
logoDrop.addEventListener('click',()=>logoFile.click());
logoDrop.addEventListener('dragover',e=>{e.preventDefault();logoDrop.classList.add('drag-over');});
logoDrop.addEventListener('dragleave',()=>logoDrop.classList.remove('drag-over'));
logoDrop.addEventListener('drop',e=>{e.preventDefault();logoDrop.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f?.type.startsWith('image/'))loadLogo(f);});
logoFile.addEventListener('change',()=>{if(logoFile.files[0])loadLogo(logoFile.files[0]);});
function autoSetLogoDims(nw,nh){
  const MAX=260,ar=nw/nh;
  const fw=ar>=1?MAX:MAX*ar, fh=ar>=1?MAX/ar:MAX;
  // update active built-in template params
  if(activeTpl&&activeTpl!==CUSTOM_TPL){
    ['logo_w','logo_h'].forEach((key,i)=>{
      const pd=activeTpl.params.find(p=>p.key===key);
      if(pd)pd.value=Math.round(i===0?fw:fh);
    });
    buildTemplateParams(activeTpl);
  }
  // update all custom logo layers
  customLayers.forEach(l=>{
    if(l.type==='logo'){
      const wp=l.params.find(p=>p.key==='width'),hp=l.params.find(p=>p.key==='height');
      if(wp)wp.value=Math.round(fw);
      if(hp)hp.value=Math.round(fh);
    }
  });
  if(selectedLayerIdx>=0)buildLayerParams(selectedLayerIdx);
}
function loadLogo(file){
  const url=URL.createObjectURL(file);const img=new Image();
  img.onload=()=>{
    logoImg=img;logoThumb.src=url;logoThumb.style.display='block';
    buildLogoChannels();
    autoSetLogoDims(img.naturalWidth||512,img.naturalHeight||512);
    renderPreview();
  };
  img.src=url;
}

document.getElementById('inp-bg').addEventListener('input',e=>{bgHex=e.target.value;document.getElementById('bg-hex').textContent=bgHex;renderPreview();});

document.getElementById('inp-tagline').addEventListener('input',()=>{renderPreview();});
const slDur=document.getElementById('sl-duration'),valDur=document.getElementById('val-duration');
slDur.addEventListener('input',()=>{duration=parseFloat(slDur.value);valDur.textContent=`${duration}s`;});
const slFps=document.getElementById('sl-fps'),valFps=document.getElementById('val-fps');
slFps.addEventListener('input',()=>{fps=parseInt(slFps.value);valFps.textContent=fps;});
